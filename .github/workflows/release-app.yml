name: Release .app

# Triggered by v* tag pushes. Builds the .app, packages it as a
# notarized + stapled DMG, attaches the DMG to the GitHub Release,
# generates the Sparkle EdDSA signature, and appends a new appcast
# entry on the gh-pages branch.
#
# Required secrets (see docs/release.md for setup):
#   APPLE_DEV_ID_CERT_P12_BASE64    Developer ID Application .p12 (base64)
#   APPLE_DEV_ID_CERT_PASSWORD      password for the .p12
#   APPLE_API_KEY_BASE64            App Store Connect API .p8 (base64)
#   APPLE_API_KEY_ID                10-char API key id
#   APPLE_API_ISSUER_ID             UUID issuer id
#   SPARKLE_PRIVATE_KEY             Sparkle EdDSA private key (base64)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.2.1) — for manual runs"
        required: true

jobs:
  build-and-release:
    name: Build .app + DMG, attach to Release, update appcast
    runs-on: macos-latest
    permissions:
      contents: write   # create release + push to gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version string
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tooling
        run: brew install xcodegen create-dmg

      - name: Import Developer ID Application certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEV_ID_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEV_ID_CERT_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$API_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo "APPLE_API_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build + notarize + staple the .app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          ./app/scripts/build-app.sh

      - name: Build + notarize + staple the DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./app/scripts/build-dmg.sh

      - name: Generate Sparkle EdDSA signature
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG="dist/AccountPilot-${VERSION}.dmg"
          # sign-update.sh uses SPARKLE_PRIVATE_KEY env if set.
          SIG_LINE="$(./scripts/sign-update.sh "$DMG")"
          # Mark output so subsequent steps can read it. The sig line is
          # safe to log (public signature, not the key).
          {
            echo "ed_sig_line<<EOF"
            echo "$SIG_LINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release + upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG="dist/AccountPilot-${VERSION}.dmg"
          gh release create "v${VERSION}" "$DMG" \
            --title "AccountPilot ${VERSION}" \
            --notes "Auto-built by .github/workflows/release-app.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --verify-tag

      - name: Update appcast.xml on gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          ED_SIG_LINE: ${{ steps.sparkle.outputs.ed_sig_line }}
        run: |
          DMG="$(realpath dist/AccountPilot-${VERSION}.dmg)"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/AccountPilot-${VERSION}.dmg"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          ./scripts/append-appcast-entry.sh \
            /tmp/gh-pages/appcast.xml \
            "${VERSION}" \
            "$DMG" \
            "$DOWNLOAD_URL" \
            "$ED_SIG_LINE"

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "release: appcast entry for v${VERSION}"
          git push origin gh-pages
