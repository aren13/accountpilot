name: Build, sign, and notarize FDA helper

# Builds accountpilot-fda-helper, signs with the org Developer ID cert,
# notarizes via App Store Connect API, and uploads the artifacts to the
# triggering GitHub Release.
#
# Setup (one-time, see docs/ci-setup.md for full instructions):
#   GitHub repo → Settings → Secrets and variables → Actions:
#     APPLE_CERT_P12_BASE64   base64 of the Developer ID .p12 export
#     APPLE_CERT_PASSWORD     password protecting the .p12
#     APPLE_API_KEY_BASE64    base64 of the App Store Connect .p8
#     APPLE_API_KEY_ID        10-char Key ID from appstoreconnect.apple.com/access/api
#     APPLE_API_ISSUER_ID     UUID issuer ID
#
# To release:
#   git tag fda-helper-v0.1.1
#   git push --tags
# Then create a GH Release at that tag — this workflow will attach the
# signed/notarized binaries to it. Or use workflow_dispatch and pass a
# tag manually for a dry-run.

on:
  push:
    tags:
      - "fda-helper-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach artifacts to (e.g. fda-helper-v0.1.1)"
        required: true

jobs:
  release:
    name: Build + sign + notarize on Apple Silicon
    runs-on: macos-14   # arm64 runner
    permissions:
      contents: write   # to upload assets to the release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          # Persist for later steps without leaking via logs.
          echo "::add-mask::$KEYCHAIN_PASS"
          echo "BUILD_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"

          # Decode the .p12 from secret to a private temp dir.
          CERT_FILE="$RUNNER_TEMP/cert.p12"
          echo -n "$CERT_P12_BASE64" | base64 -d > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Prepend our keychain so codesign + Swift toolchain find it.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '" ')

          security import "$CERT_FILE" \
              -k "$KEYCHAIN_PATH" \
              -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security
          rm -f "$CERT_FILE"

          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$API_KEY_BASE64" | base64 -d > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize
        env:
          APPLE_DEV_ID: "Developer ID Application: FAZLA GIDA ANONIM SIRKETI (P2R7PD8VGY)"
          APPLE_TEAM_ID: "P2R7PD8VGY"
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          # APPLE_API_KEY_PATH already exported by the previous step.
        run: ./scripts/release-helper.sh

      - name: Clean up temporary keychain
        if: always()
        run: |
          if [[ -n "${BUILD_KEYCHAIN:-}" && -f "$BUILD_KEYCHAIN" ]]; then
            security delete-keychain "$BUILD_KEYCHAIN" || true
          fi
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/cert.p12"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG='${{ steps.tag.outputs.ref }}'
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::warning::release $TAG does not exist yet — creating it"
            gh release create "$TAG" --title "FDA helper $TAG" --generate-notes
          fi
          gh release upload "$TAG" \
              dist/accountpilot-fda-helper-*-arm64.tar.gz \
              dist/accountpilot-fda-helper-*-arm64.zip \
              dist/SHA256SUMS \
              --clobber
