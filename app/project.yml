name: AccountPilot
options:
  bundleIdPrefix: com.accountpilot
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: P2R7PD8VGY
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: FAZLA GIDA ANONIM SIRKETI (P2R7PD8VGY)"
    OTHER_CODE_SIGN_FLAGS: "--timestamp"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

targets:
  AccountPilot:
    type: application
    platform: macOS
    sources:
      - path: AccountPilot
        excludes:
          - "Shared/**/*"
      - path: AccountPilot/Shared
    resources:
      - path: AccountPilot/Assets.xcassets
    info:
      path: AccountPilot/Info.plist
      properties:
        CFBundleIdentifier: com.accountpilot.app
        CFBundleName: AccountPilot
        CFBundleDisplayName: AccountPilot
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright (C) 2026 Hasan Arda Eren. AGPL-3.0-or-later."
        SUFeedURL: "https://aren13.github.io/accountpilot/appcast.xml"
        SUPublicEDKey: "REPLACE_AFTER_GENERATING_KEY"
        SUEnableInstallerLauncherService: false
    entitlements:
      path: AccountPilot/AccountPilot.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: false
        com.apple.security.cs.allow-unsigned-executable-memory: false
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - target: AccountPilotXPC
        copy:
          destination: plugins
          embed: true
      - package: Sparkle
        product: Sparkle

  AccountPilotXPC:
    type: xpc-service
    platform: macOS
    sources:
      - path: AccountPilotXPC
      - path: AccountPilot/Shared
    info:
      path: AccountPilotXPC/Info.plist
      properties:
        CFBundleIdentifier: com.accountpilot.SyncService
        CFBundleName: AccountPilotSyncService
        CFBundlePackageType: XPC!
        XPCService:
          ServiceType: Application
          RunLoopType: dispatch_main
    entitlements:
      path: AccountPilotXPC/SyncServiceXPC.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.disable-library-validation: true

  AccountPilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AccountPilotTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: AccountPilot
